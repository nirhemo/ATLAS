name: CLA

# Contributor License Agreement gate. ATLAS is dual-licensed (AGPL-3.0 + a
# commercial license), so every contribution must carry the inbound grant in
# CONTRIBUTING.md that lets the maintainer also license it commercially. This
# workflow asks first-time contributors to sign by commenting on their PR.
#
# DORMANT until you activate it (so it never shows a failing check before setup):
#   1. Create a Personal Access Token (classic, scope: repo) and add it as a
#      repo secret named PERSONAL_ACCESS_TOKEN
#      (Settings → Secrets and variables → Actions → New repository secret).
#   2. Add a repository variable CLA_ENABLED = true
#      (Settings → Secrets and variables → Actions → Variables → New variable).
# Signatures are stored in signatures/cla.json on the main branch.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    if: vars.CLA_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: CLA assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/nirhemo/ATLAS/blob/main/CONTRIBUTING.md'
          branch: 'main'
          custom-notsigned-prcomment: 'Thanks for the PR! ATLAS is dual-licensed, so before we can merge, please confirm the contribution terms by posting the comment below.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          allowlist: 'nirhemo,bot*,dependabot[bot]'
